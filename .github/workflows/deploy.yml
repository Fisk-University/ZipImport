name: Deploy Omeka via Tag

on:
  push:
    tags:
      - 'v*.*.*-*'

jobs:
  parse-env:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.setenv.outputs.env }}
    steps:
      - name: Extract environment from tag
        id: setenv
        run: |
          ENV=$(echo '${{ github.ref_name }}' | grep -oE '(dev|test|stage|prod)$' || true)
          if [ -z "$ENV" ]; then
            echo "ERROR: Tag must end in -dev, -test, -stage, or -prod"
            exit 1
          fi
          echo "env=$ENV" >> $GITHUB_OUTPUT

  deploy:
    needs: parse-env
    runs-on: ubuntu-latest
    environment: ${{ needs.parse-env.outputs.env_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create artifact
        run: zip -r artifact.zip . -x ".git/*" "artifact.zip"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_BASTION }}" > ~/.ssh/bastion.pem
          echo "${{ secrets.SSH_KEY_TARGET }}" > ~/.ssh/target.pem
          chmod 600 ~/.ssh/*.pem

          cat <<EOF > ~/.ssh/config
          Host bastion
              HostName ${{ secrets.BASTION_HOST }}
              User ec2-user
              IdentityFile ~/.ssh/bastion.pem

          Host target
              HostName ${{ secrets.TARGET_HOST }}
              User ubuntu
              IdentityFile ~/.ssh/target.pem
              ProxyJump bastion
          EOF

      - name: Test SSH
        run: ssh -o StrictHostKeyChecking=no target "echo '[INFO] SSH OK'"

      - name: Upload artifact
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY_TARGET }}
          source: artifact.zip
          target: "~"

      - name: Upload deploy.sh
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY_TARGET }}
          source: .github/workflows/deploy.sh
          target: "~"

      - name: Run deploy.sh remotely
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY_TARGET }}
          script: |
            chmod +x ~/deploy.sh
            ~/deploy.sh ${{ needs.parse-env.outputs.env_name }} ${{ github.ref_name }}
