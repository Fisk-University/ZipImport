name: Deploy Omeka Module/Theme via Git Tag

on:
  push:
    tags:
      - 'v*.*.*-*'  # Example: v1.2.3-prod or v1.0.0-stage

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Parse target environment from tag
        id: env
        run: |
          echo "Raw ref: ${{ github.ref }}"
          ENV=$(echo '${{ github.ref }}' | grep -oE '(dev|test|stage|prod)$' || true)
          if [ -z "$ENV" ]; then
            echo "ERROR: Could not extract environment from tag."
            exit 1
          fi
          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "env_name=$ENV" >> $GITHUB_OUTPUT

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SSH_KEY_BASTION }}" ]; then echo "Missing SSH_KEY_BASTION" && exit 1; fi
          if [ -z "${{ secrets.SSH_KEY_TARGET }}" ]; then echo "Missing SSH_KEY_TARGET" && exit 1; fi
          if [ -z "${{ secrets.BASTION_HOST }}" ]; then echo "Missing BASTION_HOST" && exit 1; fi
          if [ -z "${{ secrets.TARGET_HOST }}" ]; then echo "Missing TARGET_HOST" && exit 1; fi

      - name: Create deployment artifact
        run: |
          zip -r artifact.zip . -x ".git/*" "artifact.zip" ".github/workflows/deploy.yml"

      - name: Configure SSH with ProxyJump (Bastion)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_BASTION }}" > ~/.ssh/bastion.pem
          echo "${{ secrets.SSH_KEY_TARGET }}" > ~/.ssh/target.pem
          chmod 600 ~/.ssh/*.pem

          cat <<EOF > ~/.ssh/config
          Host bastion
              HostName ${{ secrets.BASTION_HOST }}
              User ec2-user
              IdentityFile ~/.ssh/bastion.pem

          Host target
              HostName ${{ secrets.TARGET_HOST }}
              User ubuntu
              IdentityFile ~/.ssh/target.pem
              ProxyJump bastion
          EOF

      - name: Test SSH connection to target
        run: |
          ssh -o StrictHostKeyChecking=no target "echo '[INFO] SSH connection to target successful.'"

      - name: Upload artifact.zip via SCP
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY_TARGET }}
          port: 22
          source: artifact.zip
          target: "~"

      - name: Upload deploy.sh via SCP
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY_TARGET }}
          port: 22
          source: .github/workflows/deploy.sh
          target: "~"

      - name: Execute deploy.sh remotely
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY_TARGET }}
          port: 22
          script: |
            set -e
            echo "[INFO] Starting remote deploy.sh..."
            chmod +x ~/deploy.sh
            ~/deploy.sh ${{ env.ENV }} ${{ github.ref_name }}
